name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn clean verify
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render
        run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"